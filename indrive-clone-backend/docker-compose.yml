# docker-compose — InDrive Clone backend
#
# Wires up the three microservices plus their dependencies (Redis,
# Postgres, MongoDB). Bring everything up with:
#
#   docker compose up --build
#
# Then hit:
#   - API Gateway:        http://localhost:8080
#   - Rust pricing HTTP:  http://localhost:8082/quote?pickup_lat=40.7580&pickup_lng=-73.9855&dropoff_lat=40.7829&dropoff_lng=-73.9654&vehicle_type=sedan
#   - Realtime WS:        ws://localhost:8081/ws/drivers?id=<driverId>
#   - gRPC pricing:        localhost:50051
#   - gRPC matching:      localhost:50052

name: indrive-clone-backend

services:
  # ---- infrastructure ------------------------------------------------
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set in .env}
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indrive -d indrive"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:?set in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?set in .env}
      MONGO_INITDB_DATABASE: ride_logs
    ports: ["27017:27017"]
    volumes:
      - mongodata:/data/db

  # ---- pricing engine (Rust) ----------------------------------------
  pricing:
    build:
      context: ./computation-rust
      dockerfile: Dockerfile
    environment:
      RUST_LOG: info
      GRPC_ADDR: 0.0.0.0:50051
      HTTP_ADDR: 0.0.0.0:8082
    ports:
      - "8082:8082"   # Axum debug HTTP
      - "50051:50051" # gRPC PricingEngine
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/health"]
      interval: 10s
      timeout: 3s
      retries: 6

  # ---- realtime matching (Go) ---------------------------------------
  realtime:
    build:
      context: ./realtime-go
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      LISTEN_ADDR: ":8081"
      GRPC_ADDR: ":50052"
      # Must match the gateway's JWT_SECRET so WS tokens verify.
      JWT_SECRET: ${JWT_SECRET:?set in .env}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-localhost:5173,localhost:3000}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"   # HTTP + WebSocket
      - "50052:50052" # gRPC RideMatching

  # ---- API gateway (Hono.js / Bun) ----------------------------------
  gateway:
    build:
      context: .
      dockerfile: ./api-gateway-hono/Dockerfile
    environment:
      PORT: 8080
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:?set in .env}
      # Browser origins allowed to send the credentialed session cookie.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      PRICING_GRPC_ADDR: pricing:50051
      MATCHING_GRPC_ADDR: realtime:50052
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pricing:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  pgdata:
  mongodata:
