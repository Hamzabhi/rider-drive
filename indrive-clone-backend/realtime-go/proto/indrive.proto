syntax = "proto3";

package indrive;

// gRPC contract shared by all three microservices.
//  - api-gateway-hono (client)
//  - computation-rust (server: Pricing & Routing)
//  - realtime-go    (server: Driver location + bid matching, also client of pricing)

option go_package = "indriveclone/proto/indrivepb";

// ---------------------------------------------------------------------------
// Pricing & Routing service — served by `computation-rust` (Axum + tonic).
// Called by `api-gateway-hono` when a rider drops a pin to get a suggested fare
// and again when a ride is finalized to recompute the final fare.
// ---------------------------------------------------------------------------

service PricingEngine {
  // Suggested fare + route metadata for a rider's A -> B request.
  rpc CalculateFare(FareRequest) returns (FareEstimate);

  // Final fare after the ride completes (actual distance + time + surge).
  rpc FinalizeFare(FinalizeRequest) returns (FareEstimate);
}

message FareRequest {
  Point pickup = 1;
  Point dropoff = 2;
  string vehicle_type = 3;        // sedan | suv | luxury | motorcycle
  bool   surge_eligible = 4;       // apply dynamic surge multiplier
  string currency = 5;            // ISO 4217, e.g. "USD"
}

message FinalizeRequest {
  Point pickup = 1;
  Point dropoff = 2;
  double actual_distance_meters = 3;
  uint32 actual_duration_seconds = 4;
  string vehicle_type = 5;
  string currency = 6;
}

message Point {
  double latitude = 1;
  double longitude = 2;
  string address = 3;
}

message FareEstimate {
  double base_fare = 1;
  double distance_fare = 2;
  double time_fare = 3;
  double surge_multiplier = 4;
  double booking_fee = 5;
  double suggested_fare = 6;      // total the rider should offer
  double minimum_fare = 7;
  string currency = 8;
  // route metadata returned for the UI
  double distance_meters = 9;
  uint32 duration_seconds = 10;
  // optional OSRM-style polyline once routing data is wired
  string encoded_polyline = 11;
}

// ---------------------------------------------------------------------------
// Ride Matching + Driver location service — served by `realtime-go`.
// Called by `api-gateway-hono` to broadcast a new ride request to nearby drivers
// via Redis GEORADIUS lookup and to let drivers place counter-offers (bids).
// ---------------------------------------------------------------------------

service RideMatching {
  // Rider (via API Gateway) asks to find drivers near a pickup point.
  // Returns the ride_id and the list of driver ids that got notified.
  rpc CreateRideRequest(CreateRideRequestMsg) returns (RideRequestAck);

  // A driver counter-offers a price for an open ride.
  rpc SubmitDriverBid(DriverBid) returns (BidAck);

  // Rider accepts one of the counter-offers, locking in the driver.
  rpc AcceptBid(AcceptBidMsg) returns (AcceptAck);

  // Rider cancels an open request (no driver assigned yet).
  rpc CancelRideRequest(CancelRideMsg) returns (Empty);
}

message CreateRideRequestMsg {
  string rider_id = 1;
  string ride_id = 2;             // generated by API Gateway
  Point pickup = 3;
  Point dropoff = 4;
  double rider_proposed_fare = 5; // InDrive: rider posts their own price
  string currency = 6;
  string vehicle_type = 7;
  uint32 search_radius_meters = 8; // default 5000m
}

message RideRequestAck {
  string ride_id = 1;
  repeated string notified_driver_ids = 2;
  uint32  nearby_driver_count = 3;
}

message DriverBid {
  string ride_id = 1;
  string driver_id = 2;
  double counter_offer = 3;       // driver's counter price vs rider's ask
  uint32 eta_seconds = 4;         // pickup ETA
  string currency = 5;
}

message BidAck {
  string bid_id = 1;
  uint32 ttl_seconds = 2;         // bid validity (120s default)
}

message AcceptBidMsg {
  string ride_id = 1;
  string bid_id = 2;
  string driver_id = 3;
}

message AcceptAck {
  bool success = 1;
  string assigned_driver_id = 2;
  double agreed_fare = 3;
}

message CancelRideMsg {
  string ride_id = 1;
  string rider_id = 2;
}

message Empty {}
